*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#E8820C;--amber-dark:#C4660A;--amber-glow:#FFF3E0;
  --ink:#1A1410;--ink-mid:#3D2B1F;--ink-soft:#7A6555;
  --steel:#182030;--steel-mid:#243349;--steel-accent:#2E4A6E;
  --cream:#FBF7F2;--white:#FFFFFF;--border:rgba(0,0,0,0.09);

}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,0.5)}70%{box-shadow:0 0 0 10px rgba(37,211,102,0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fade-up{animation:fadeUp 0.6s ease both}
.delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}.delay-3{animation-delay:0.3s}.delay-4{animation-delay:0.4s}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--steel);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 6%;height:64px;
  border-bottom:3px solid var(--amber);
}
.nav-brand{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.35rem;font-weight:700;letter-spacing:1px;
  color:var(--white);
}
.nav-brand em{font-style:normal;color:var(--amber)}
.nav-call{
  display:flex;align-items:center;gap:10px;
  background:var(--amber);color:var(--white);
  padding:9px 22px;border-radius:5px;
  text-decoration:none;font-weight:600;font-size:0.95rem;
  transition:background .2s,transform .15s;
}
.nav-call:hover{background:var(--amber-dark);transform:translateY(-1px)}
.nav-call svg{width:16px;height:16px;flex-shrink:0}

}
.hero-grid-bg{

  background-size:48px 48px;
}
.hero-glow{
  position:absolute;right:-100px;bottom:-100px;
  width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,130,12,0.15) 0%,transparent 65%);
}
.hero-content{position:relative;z-index:2;max-width:620px}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(232,130,12,0.15);
  border:1px solid rgba(232,130,12,0.35);
  color:var(--amber);font-size:0.8rem;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:6px 14px;border-radius:3px;margin-bottom:24px;
}
.hero h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(2.4rem,5.5vw,3.8rem);
  font-weight:800;line-height:1.1;color:var(--white);
  margin-bottom:20px;
}
.hero h1 .highlight{
  color:transparent;
  background:linear-gradient(90deg,#E8820C,#F5A623,#E8820C);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  animation:shimmer 3s linear infinite;
}
.hero-sub{
  font-size:1.05rem;color:rgba(255,255,255,0.65);
  line-height:1.75;margin-bottom:36px;max-width:500px;
}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:52px}
.btn-amber{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--amber);color:var(--white);
  padding:14px 28px;border-radius:5px;text-decoration:none;
  font-weight:600;font-size:1rem;
  transition:background .2s,transform .15s;
}
.btn-amber:hover{background:var(--amber-dark);transform:translateY(-2px)}
.btn-wa{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--wa);color:var(--white);
  padding:14px 28px;border-radius:5px;text-decoration:none;
  font-weight:600;font-size:1rem;
  transition:filter .2s,transform .15s;
  animation:pulse 2.5s infinite;
}
.btn-wa:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-amber svg,.btn-wa svg{width:18px;height:18px}

.hero-stats{display:flex;gap:36px;flex-wrap:wrap}
.hstat{border-left:2px solid var(--amber);padding-left:16px}
.hstat-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:2rem;font-weight:700;color:var(--amber);line-height:1;
}
.hstat-label{font-size:0.78rem;color:rgba(255,255,255,0.45);margin-top:4px;letter-spacing:.5px}

}
.sec-sub{font-size:1rem;color:var(--ink-soft);line-height:1.75;max-width:560px;margin-bottom:52px}

.owner-card{

.owner-card-top{padding:36px 24px 28px;text-align:center;position:relative}

.owner-title-text{font-size:1rem;color:var(--amber);font-weight:600;margin-bottom:20px}
.owner-bio{font-size:1rem;color:var(--ink-soft);line-height:1.8;margin-bottom:32px}

.contact-list{display:flex;flex-direction:column;gap:14px;margin-bottom:32px}

  display:inline-flex;align-items:center;gap:10px;

.btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.15)}

/* FOOTER */

  background:var(--ink);padding:44px 6% 28px;

.footer-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.3rem;font-weight:700;color:var(--white);margin-bottom:8px;

.footer-logo em{font-style:normal;color:var(--amber)}
.footer-phone{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.5rem;font-weight:700;color:var(--amber);

.footer-copy{text-align:center}

@media(max-width:768px){
  .owner-layout{grid-template-columns:1fr}
  .owner-card{max-width:320px;margin:0 auto}
  nav{padding:0 4%}
  section{padding:60px 4%}
  .hero{padding:52px 4%}
  .cta-band{padding:44px 4%}
  footer{padding:40px 4% 24px}
}
</style>
